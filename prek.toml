[update]
freeze = true

[[repos]]
repo = "builtin"
hooks = [
  { id = "check-added-large-files" },
  { id = "check-case-conflict" },
  { id = "check-merge-conflict" },
  { id = "check-toml" },
  { id = "check-yaml" },
  { id = "detect-private-key" },
  { id = "end-of-file-fixer" },
  { id = "trailing-whitespace" },
  { id = "mixed-line-ending", args = ["--fix=lf"] },
]

[[repos]]
repo = "https://github.com/rbubley/mirrors-prettier"
rev = "0ee178619d696787ca73d210cc191d720868c631" # frozen: v3.9.6
hooks = [
  { id = "prettier" },
]

[[repos]]
repo = "https://github.com/crate-ci/typos"
rev = "bee27e3a4fd1ea2111cf90ab89cd076c870fce14" # frozen: v1.48.0
hooks = [
  { id = "typos" },
]

[[repos]]
repo = "https://github.com/python-jsonschema/check-jsonschema"
rev = "6b63472e72e1a91ed8a2f6d483790dfb644fa1d3" # frozen: 0.37.4
hooks = [
  { id = "check-github-workflows" },
  { id = "check-renovate" },
]

[[repos]]
repo = "https://github.com/rhysd/actionlint"
rev = "914e7df21a07ef503a81201c76d2b11c789d3fca" # frozen: v1.7.12
hooks = [
  { id = "actionlint" },
]

[[repos]]
repo = "https://github.com/zizmorcore/zizmor-pre-commit"
rev = "067260dc5fe6ea86b7551bfd6f8b3ba4e6c93129" # frozen: v1.28.0
hooks = [
  { id = "zizmor", args = ["--fix=safe"] },
]

[[repos]]
repo = "https://github.com/compwa/taplo-pre-commit"
rev = "ade0f95ddcf661c697d4670d2cfcbe95d0048a0a" # frozen: v0.9.3
hooks = [
  { id = "taplo-format" },
]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "2700fd5671c633760d912769c041bfcde2b9a01b" # frozen: v0.15.22
hooks = [
  { id = "ruff-format" },
  { id = "ruff-check", args = ["--fix"] },
]

[[repos]]
repo = "https://github.com/astral-sh/ty-pre-commit"
rev = "a2c42a517f3f505d7ffebb9a68fa41ac3a2dec4a" # frozen: v0.0.62
hooks = [
  { id = "ty" },
]
